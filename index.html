<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>免費廣東話語音記帳 App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; -webkit-tap-highlight-color: transparent; }
        .recording { animation: pulse 1.5s infinite; }
        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { transform: scale(1.1); box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }
        .modal { transition: opacity 0.25s ease; }
        .page { display: none; }
        .page-active { display: block; }
        .calendar-day.selected { background-color: #4f46e5; color: white; border-radius: 9999px; }
        .has-expense::after { content: ''; display: block; width: 4px; height: 4px; background: #ef4444; border-radius: 50%; margin: 2px auto 0; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-24">

    <!-- 頁面 1: 總覽 (Home) -->
    <div id="page-home" class="page page-active">
        <header class="bg-indigo-600 text-white p-6 rounded-b-3xl shadow-lg sticky top-0 z-10">
            <div class="flex justify-between items-start">
                <div>
                    <h1 class="text-xl font-bold">廣東話記帳本</h1>
                    <p class="text-indigo-100 text-sm opacity-80" id="currentDate"></p>
                </div>
                <div class="flex gap-2">
                    <button onclick="openManualInput()" class="bg-white/20 px-3 py-1 rounded-full text-xs hover:bg-white/30 transition">手動</button>
                    <button onclick="exportCSV()" class="bg-white/20 px-3 py-1 rounded-full text-xs hover:bg-white/30 transition">匯出</button>
                </div>
            </div>
            
            <div class="mt-4 grid grid-cols-2 gap-4">
                <div class="bg-white/20 p-3 rounded-2xl">
                    <p class="text-xs">今日支出</p>
                    <p class="text-lg font-bold" id="todayTotal">$0</p>
                </div>
                <div class="bg-white/20 p-3 rounded-2xl">
                    <p class="text-xs">本月累計</p>
                    <p class="text-lg font-bold" id="monthTotal">$0</p>
                </div>
            </div>
        </header>

        <main class="p-4 space-y-6">
            <section class="bg-white p-4 rounded-2xl shadow-sm">
                <div class="flex justify-between items-center mb-2">
                    <h2 class="text-gray-500 text-sm font-medium">支出比例</h2>
                    <span id="chartFallback" class="text-[10px] text-gray-300 hidden">暫無資料</span>
                </div>
                <div class="h-44 flex justify-center">
                    <canvas id="categoryChart"></canvas>
                </div>
            </section>

            <section>
                <div class="flex justify-between items-center mb-3">
                    <h2 class="text-gray-700 font-bold italic">最近紀錄</h2>
                    <button onclick="clearAll()" class="text-xs text-red-400 font-medium">清除全部</button>
                </div>
                <div id="expenseList" class="space-y-3"></div>
            </section>
        </main>
    </div>

    <!-- 頁面 2: 日曆 (Calendar) -->
    <div id="page-calendar" class="page">
        <header class="bg-indigo-600 text-white p-6 rounded-b-3xl shadow-lg sticky top-0 z-10">
            <h1 class="text-xl font-bold">收支日曆</h1>
            <p class="text-indigo-100 text-sm opacity-80" id="calendarMonthTitle"></p>
        </header>

        <main class="p-4 space-y-4">
            <!-- 日曆本體 -->
            <div class="bg-white p-4 rounded-2xl shadow-sm">
                <div class="grid grid-cols-7 text-center text-xs text-gray-400 mb-2">
                    <div>日</div><div>一</div><div>二</div><div>三</div><div>四</div><div>五</div><div>六</div>
                </div>
                <div id="calendarGrid" class="grid grid-cols-7 gap-y-2 text-center text-sm font-medium">
                    <!-- JS 生成日曆 -->
                </div>
            </div>

            <!-- 選中日期的清單 -->
            <section>
                <h2 id="selectedDayLabel" class="text-gray-700 font-bold mb-3">選擇日期查看支出</h2>
                <div id="dayExpenseList" class="space-y-3">
                    <div class="text-center py-8 text-gray-400 text-xs">請點擊上方日期</div>
                </div>
            </section>
        </main>
    </div>

    <!-- 底部導覽列 -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-100 flex justify-around items-center py-2 pb-safe z-40">
        <button onclick="switchPage('home')" id="nav-home" class="flex flex-col items-center p-2 text-indigo-600">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
            </svg>
            <span class="text-[10px] mt-1 font-bold">總覽</span>
        </button>
        <div class="relative -top-4">
            <button id="voiceBtn" class="bg-indigo-600 text-white w-14 h-14 rounded-full shadow-xl flex items-center justify-center transition-all active:scale-90">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z" />
                </svg>
            </button>
        </div>
        <button onclick="switchPage('calendar')" id="nav-calendar" class="flex flex-col items-center p-2 text-gray-400">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
            </svg>
            <span class="text-[10px] mt-1 font-bold">日曆</span>
        </button>
    </nav>

    <!-- 提示框 -->
    <div id="toast" class="fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 bg-black/80 text-white px-6 py-4 rounded-3xl text-sm hidden z-50 text-center shadow-2xl backdrop-blur-sm">
        <div class="mb-2 font-bold text-indigo-300">聽緊你講嘢...</div>
        <div id="liveResult" class="text-xs opacity-70 italic">請講出品項同金額</div>
    </div>

    <!-- 編輯 Modal -->
    <div id="editModal" class="modal fixed inset-0 z-50 flex items-center justify-center opacity-0 pointer-events-none">
        <div class="absolute inset-0 bg-black/50 backdrop-blur-sm" onclick="closeModal()"></div>
        <div class="bg-white w-11/12 max-w-sm rounded-3xl p-6 relative z-10 shadow-2xl">
            <h3 id="modalTitle" class="text-lg font-bold text-gray-800 mb-4">編輯紀錄</h3>
            <div class="space-y-4">
                <input id="editItem" type="text" class="w-full bg-slate-100 border-none rounded-xl p-3 outline-none" placeholder="項目">
                <input id="editAmount" type="number" class="w-full bg-slate-100 border-none rounded-xl p-3 outline-none" placeholder="金額">
                <select id="editCategory" class="w-full bg-slate-100 border-none rounded-xl p-3 outline-none">
                    <option value="飲食">飲食</option><option value="交通">交通</option><option value="娛樂">娛樂</option><option value="生活">生活</option><option value="其他">其他</option>
                </select>
                <div class="flex gap-2"><button onclick="saveEdit()" class="flex-1 bg-indigo-600 text-white py-3 rounded-xl font-bold">儲存</button><button onclick="closeModal()" class="flex-1 bg-slate-100 text-slate-500 py-3 rounded-xl font-bold">取消</button></div>
            </div>
        </div>
    </div>

    <script>
        let expenses = JSON.parse(localStorage.getItem('expenses')) || [];
        let chart = null;
        let currentEditingId = null;
        let selectedDay = new Date();

        const categories = {
            '飲食': ['餐', '飯', '麵', '飲', '啡', '茶', '早餐', '午餐', '晚餐', '零食', '肉', '菜', '宵夜', '多士'],
            '交通': ['車', '地鐵', '巴士', '小巴', '的士', 'Uber', '火車', '票', '泊車', '隧道'],
            '娛樂': ['玩', '戲', '唱', 'Game', '運動', '波', '旅遊', '旅行'],
            '生活': ['買', '藥', '水', '電', '租', '衫', '鞋', '雜貨', '超市', '淘寶'],
            '其他': []
        };

        window.onload = () => {
            updateUI();
            document.getElementById('currentDate').innerText = new Date().toLocaleDateString('zh-HK', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' });
            renderCalendar();
        };

        function switchPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('page-active'));
            document.getElementById('page-' + pageId).classList.add('page-active');
            
            // 更新導覽列顏色
            document.getElementById('nav-home').classList.toggle('text-indigo-600', pageId === 'home');
            document.getElementById('nav-home').classList.toggle('text-gray-400', pageId !== 'home');
            document.getElementById('nav-calendar').classList.toggle('text-indigo-600', pageId === 'calendar');
            document.getElementById('nav-calendar').classList.toggle('text-gray-400', pageId !== 'calendar');

            if (pageId === 'calendar') renderCalendar();
        }

        function updateUI() {
            renderList();
            renderChart();
            updateSummary();
            localStorage.setItem('expenses', JSON.stringify(expenses));
            if (document.getElementById('page-calendar').classList.contains('page-active')) {
                renderCalendar();
                showDayExpenses(selectedDay);
            }
        }

        function updateSummary() {
            const now = new Date();
            const todayStr = now.toLocaleDateString();
            const todaySum = expenses.filter(e => new Date(e.date).toLocaleDateString() === todayStr).reduce((sum, e) => sum + e.amount, 0);
            const monthSum = expenses.filter(e => {
                const d = new Date(e.date);
                return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
            }).reduce((sum, e) => sum + e.amount, 0);
            document.getElementById('todayTotal').innerText = `$${todaySum.toLocaleString()}`;
            document.getElementById('monthTotal').innerText = `$${monthSum.toLocaleString()}`;
        }

        function renderList() {
            const list = document.getElementById('expenseList');
            list.innerHTML = '';
            const displayData = [...expenses].sort((a,b) => new Date(b.date) - new Date(a.date)).slice(0, 15);
            if (displayData.length === 0) {
                list.innerHTML = `<div class="text-center py-8 bg-white rounded-2xl border-2 border-dashed border-gray-100 text-gray-400 text-xs">仲未有紀錄喎</div>`;
                return;
            }
            displayData.forEach(exp => list.appendChild(createExpenseItem(exp)));
        }

        function createExpenseItem(exp) {
            const div = document.createElement('div');
            div.className = "bg-white p-4 rounded-xl shadow-sm flex justify-between items-center active:bg-slate-50 transition";
            div.onclick = () => openEditModal(exp);
            div.innerHTML = `
                <div class="flex items-center space-x-3 pointer-events-none">
                    <div class="w-8 h-8 bg-slate-50 text-slate-500 rounded-lg flex items-center justify-center font-bold text-[8px]">${exp.category}</div>
                    <div><p class="font-bold text-gray-800 text-xs">${exp.item}</p><p class="text-[9px] text-gray-400">${new Date(exp.date).toLocaleTimeString('zh-HK',{hour:'2-digit',minute:'2-digit'})}</p></div>
                </div>
                <div class="text-right pointer-events-none"><p class="font-black text-indigo-600 text-sm">-$${exp.amount}</p></div>
            `;
            return div;
        }

        // --- 日曆功能 ---
        function renderCalendar() {
            const grid = document.getElementById('calendarGrid');
            const monthLabel = document.getElementById('calendarMonthTitle');
            grid.innerHTML = '';
            
            const now = new Date();
            monthLabel.innerText = now.toLocaleDateString('zh-HK', { year: 'numeric', month: 'long' });

            const firstDay = new Date(now.getFullYear(), now.getMonth(), 1).getDay();
            const daysInMonth = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();

            // 填充空格
            for (let i = 0; i < firstDay; i++) grid.innerHTML += '<div></div>';

            for (let d = 1; d <= daysInMonth; d++) {
                const dateObj = new Date(now.getFullYear(), now.getMonth(), d);
                const dateStr = dateObj.toLocaleDateString();
                const isToday = dateStr === new Date().toLocaleDateString();
                const isSelected = dateStr === selectedDay.toLocaleDateString();
                const hasExp = expenses.some(e => new Date(e.date).toLocaleDateString() === dateStr);

                const dayEl = document.createElement('div');
                dayEl.className = `py-2 calendar-day relative cursor-pointer ${isSelected ? 'selected' : ''} ${isToday && !isSelected ? 'text-indigo-600 font-bold' : ''} ${hasExp ? 'has-expense' : ''}`;
                dayEl.innerText = d;
                dayEl.onclick = () => {
                    selectedDay = dateObj;
                    renderCalendar();
                    showDayExpenses(dateObj);
                };
                grid.appendChild(dayEl);
            }
        }

        function showDayExpenses(date) {
            const list = document.getElementById('dayExpenseList');
            const label = document.getElementById('selectedDayLabel');
            const dateStr = date.toLocaleDateString();
            label.innerText = `${date.getMonth()+1}月${date.getDate()}日 支出清單`;
            
            const dayData = expenses.filter(e => new Date(e.date).toLocaleDateString() === dateStr);
            list.innerHTML = '';
            
            if (dayData.length === 0) {
                list.innerHTML = '<div class="text-center py-8 text-gray-400 text-xs">當日冇任何支出紀錄</div>';
            } else {
                dayData.forEach(exp => list.appendChild(createExpenseItem(exp)));
            }
        }

        function renderChart() {
            const canvas = document.getElementById('categoryChart');
            const ctx = canvas.getContext('2d');
            const dataMap = {};
            Object.keys(categories).forEach(cat => dataMap[cat] = 0);
            expenses.forEach(e => {
                if(dataMap[e.category] !== undefined) dataMap[e.category] += e.amount;
                else dataMap['其他'] += e.amount;
            });
            const labels = Object.keys(dataMap).filter(k => dataMap[k] > 0);
            const values = labels.map(k => dataMap[k]);
            if (chart) chart.destroy();
            if (labels.length === 0) {
                document.getElementById('chartFallback').classList.remove('hidden');
                return;
            }
            document.getElementById('chartFallback').classList.add('hidden');
            chart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: labels,
                    datasets: [{ data: values, backgroundColor: ['#6366f1', '#f59e0b', '#10b981', '#ef4444', '#94a3b8'], borderWidth: 0 }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { boxWidth: 8, font: { size: 10 } } } }, cutout: '75%' }
            });
        }

        // --- 彈窗邏輯 ---
        function openManualInput() { currentEditingId = null; document.getElementById('modalTitle').innerText = '手動輸入'; document.getElementById('editItem').value = ''; document.getElementById('editAmount').value = ''; toggleModal(true); }
        function openEditModal(exp) { currentEditingId = exp.id; document.getElementById('modalTitle').innerText = '編輯紀錄'; document.getElementById('editItem').value = exp.item; document.getElementById('editAmount').value = exp.amount; document.getElementById('editCategory').value = exp.category; toggleModal(true); }
        function closeModal() { toggleModal(false); }
        function toggleModal(show) { const m = document.getElementById('editModal'); if(show){m.classList.remove('pointer-events-none'); m.classList.add('opacity-100');}else{m.classList.add('pointer-events-none'); m.classList.remove('opacity-100');}}
        
        function saveEdit() {
            const item = document.getElementById('editItem').value.trim();
            const amount = parseInt(document.getElementById('editAmount').value);
            const category = document.getElementById('editCategory').value;
            if(!item || isNaN(amount)) return alert('輸入有誤');
            if(currentEditingId){
                const idx = expenses.findIndex(e => String(e.id) === String(currentEditingId));
                if(idx !== -1) expenses[idx] = {...expenses[idx], item, amount, category};
            }else{
                expenses.push({id: Date.now().toString(), item, amount, category, date: new Date().toISOString()});
            }
            updateUI(); closeModal();
        }

        function deleteRecord(id) { if(confirm('確定刪除？')){ expenses = expenses.filter(e => String(e.id) !== String(id)); updateUI(); closeModal(); }}
        function clearAll() { if(confirm('清除所有紀錄？')){ expenses = []; updateUI(); }}

        function exportCSV() {
            let csv = "\uFEFF日期,項目,金額,分類\n";
            expenses.forEach(e => csv += `${new Date(e.date).toLocaleString()},${e.item},${e.amount},${e.category}\n`);
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `記帳備份.csv`;
            link.click();
        }

        // --- 語音辨識 ---
        const voiceBtn = document.getElementById('voiceBtn');
        const toast = document.getElementById('toast');
        const liveResult = document.getElementById('liveResult');
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

        if (SpeechRecognition) {
            const recognition = new SpeechRecognition();
            recognition.lang = 'zh-HK';
            recognition.interimResults = true;
            recognition.continuous = false;

            voiceBtn.addEventListener('click', () => { try { recognition.start(); } catch(e) { recognition.stop(); }});
            recognition.onstart = () => { voiceBtn.classList.add('recording', 'bg-red-500'); toast.classList.remove('hidden'); liveResult.innerText = '聽緊你講嘢...'; };
            recognition.onresult = (event) => {
                const transcript = Array.from(event.results).map(result => result[0].transcript).join('');
                liveResult.innerText = transcript;
                if (event.results[event.results.length - 1].isFinal) { processVoiceCommand(transcript); recognition.stop(); }
            };
            recognition.onend = () => { voiceBtn.classList.remove('recording', 'bg-red-500'); setTimeout(() => toast.classList.add('hidden'), 1500); };
        }

        function processVoiceCommand(text) {
            const amountMatch = text.match(/\d+/);
            if (!amountMatch) return;
            const amount = parseInt(amountMatch[0]);
            let item = text.replace(amountMatch[0], '').replace(/元|塊|錢|蚊/g, '').trim();
            if (!item) item = "語音輸入項目";
            let category = '其他';
            for (const [cat, keywords] of Object.entries(categories)) {
                if (keywords.some(k => item.includes(k))) { category = cat; break; }
            }
            expenses.push({ id: Date.now().toString(), item, amount, category, date: new Date().toISOString() });
            updateUI();
            if (navigator.vibrate) navigator.vibrate([50, 30, 50]);
        }
    </script>
</body>
</html>
