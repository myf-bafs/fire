<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>免費語音記帳 App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; -webkit-tap-highlight-color: transparent; }
        .recording { animation: pulse 1.5s infinite; }
        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { transform: scale(1.1); box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }
        /* 隱藏捲軸但保持滾動功能 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-28">

    <!-- 頂部狀態欄 -->
    <header class="bg-indigo-600 text-white p-6 rounded-b-3xl shadow-lg sticky top-0 z-10">
        <div class="flex justify-between items-start">
            <div>
                <h1 class="text-xl font-bold">免費記帳本</h1>
                <p class="text-indigo-100 text-sm opacity-80" id="currentDate"></p>
            </div>
            <button onclick="exportCSV()" class="bg-white/20 px-3 py-1 rounded-full text-xs hover:bg-white/30 transition">匯出 CSV</button>
        </div>
        
        <div class="mt-4 grid grid-cols-2 gap-4">
            <div class="bg-white/20 p-3 rounded-2xl">
                <p class="text-xs">今日支出</p>
                <p class="text-lg font-bold" id="todayTotal">$0</p>
            </div>
            <div class="bg-white/20 p-3 rounded-2xl">
                <p class="text-xs">本月累計</p>
                <p class="text-lg font-bold" id="monthTotal">$0</p>
            </div>
        </div>
    </header>

    <main class="p-4 space-y-6">
        <!-- 圖表區域 -->
        <section class="bg-white p-4 rounded-2xl shadow-sm">
            <div class="flex justify-between items-center mb-2">
                <h2 class="text-gray-500 text-sm font-medium">支出比例</h2>
                <span id="chartFallback" class="text-[10px] text-gray-300 hidden">暫無資料</span>
            </div>
            <div class="h-44 flex justify-center">
                <canvas id="categoryChart"></canvas>
            </div>
        </section>

        <!-- 列表區域 -->
        <section>
            <div class="flex justify-between items-center mb-3">
                <h2 class="text-gray-700 font-bold italic">Recent Activity</h2>
                <button onclick="clearAll()" class="text-xs text-red-400 font-medium">清除全部資料</button>
            </div>
            <div id="expenseList" class="space-y-3">
                <!-- 紀錄會顯示在這裡 -->
            </div>
        </section>
    </main>

    <!-- 語音控制浮動欄 -->
    <div class="fixed bottom-0 left-0 right-0 p-6 bg-gradient-to-t from-slate-50 via-slate-50 to-transparent pointer-events-none">
        <div class="max-w-md mx-auto flex flex-col items-center space-y-2 pointer-events-auto">
            <p id="hintText" class="text-[10px] text-gray-400 bg-white/80 px-3 py-1 rounded-full shadow-sm">說出「午餐 120 元」</p>
            <button id="voiceBtn" class="bg-indigo-600 text-white w-16 h-16 rounded-full shadow-2xl flex items-center justify-center transition-all active:scale-90 hover:bg-indigo-700">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z" />
                </svg>
            </button>
        </div>
    </div>

    <!-- 提示框 -->
    <div id="toast" class="fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 bg-black/80 text-white px-6 py-4 rounded-3xl text-sm hidden z-50 text-center shadow-2xl backdrop-blur-sm">
        <div class="mb-2 font-bold text-indigo-300">正在傾聽中...</div>
        <div id="liveResult" class="text-xs opacity-70 italic">請說出品項與金額</div>
    </div>

    <script>
        // 初始化資料
        let expenses = JSON.parse(localStorage.getItem('expenses')) || [];
        let chart = null;

        const categories = {
            '飲食': ['餐', '飯', '麵', '飲', '喝', '咖啡', '早餐', '午餐', '晚餐', '零食', '肉', '菜'],
            '交通': ['車', '捷運', '公車', '高鐵', '油', '計程車', 'Uber', '火車', '票'],
            '娛樂': ['玩', '電影', '歌', '遊戲', '運動', '健身', '旅遊', '門票'],
            '生活': ['買', '藥', '水', '電', '租', '日用', '衣服', '鞋', '雜貨', '超市'],
            '其他': []
        };

        window.onload = () => {
            updateUI();
            document.getElementById('currentDate').innerText = new Date().toLocaleDateString('zh-TW', { 
                year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' 
            });
        };

        function updateUI() {
            renderList();
            renderChart();
            updateSummary();
            localStorage.setItem('expenses', JSON.stringify(expenses));
        }

        function updateSummary() {
            const now = new Date();
            const todayStr = now.toLocaleDateString();
            
            const todaySum = expenses
                .filter(e => new Date(e.date).toLocaleDateString() === todayStr)
                .reduce((sum, e) => sum + e.amount, 0);
                
            const monthSum = expenses
                .filter(e => {
                    const d = new Date(e.date);
                    return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
                })
                .reduce((sum, e) => sum + e.amount, 0);

            document.getElementById('todayTotal').innerText = `$${todaySum.toLocaleString()}`;
            document.getElementById('monthTotal').innerText = `$${monthSum.toLocaleString()}`;
        }

        function renderList() {
            const list = document.getElementById('expenseList');
            list.innerHTML = '';
            
            const displayData = [...expenses].reverse().slice(0, 20);
            
            if (displayData.length === 0) {
                list.innerHTML = `
                    <div class="text-center py-12 bg-white rounded-2xl border-2 border-dashed border-gray-100">
                        <p class="text-gray-400 text-sm">還沒有紀錄喔！</p>
                        <p class="text-indigo-400 text-xs mt-1">按住麥克風說「咖啡 65 元」</p>
                    </div>
                `;
                return;
            }

            displayData.forEach((exp) => {
                const div = document.createElement('div');
                div.className = "bg-white p-4 rounded-xl shadow-sm flex justify-between items-center transition active:scale-95";
                div.innerHTML = `
                    <div class="flex items-center space-x-3">
                        <div class="w-10 h-10 bg-slate-50 text-slate-500 rounded-xl flex items-center justify-center font-bold text-[10px]">
                            ${exp.category}
                        </div>
                        <div>
                            <p class="font-bold text-gray-800 text-sm">${exp.item}</p>
                            <p class="text-[10px] text-gray-400">${new Date(exp.date).toLocaleString('zh-TW', {month:'numeric', day:'numeric', hour:'2-digit', minute:'2-digit'})}</p>
                        </div>
                    </div>
                    <div class="text-right flex flex-col items-end">
                        <p class="font-black text-indigo-600">-$${exp.amount.toLocaleString()}</p>
                        <button onclick="deleteRecord('${exp.id}')" class="text-[10px] text-red-300 hover:text-red-500">刪除</button>
                    </div>
                `;
                list.appendChild(div);
            });
        }

        function renderChart() {
            const ctx = document.getElementById('categoryChart').getContext('2d');
            const dataMap = {};
            Object.keys(categories).forEach(cat => dataMap[cat] = 0);
            
            expenses.forEach(e => {
                if(dataMap[e.category] !== undefined) dataMap[e.category] += e.amount;
                else dataMap['其他'] += e.amount;
            });

            const labels = Object.keys(dataMap).filter(k => dataMap[k] > 0);
            const values = labels.map(k => dataMap[k]);

            if (chart) chart.destroy();
            
            if (labels.length === 0) {
                document.getElementById('chartFallback').classList.remove('hidden');
                return;
            } else {
                document.getElementById('chartFallback').classList.add('hidden');
            }

            chart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: labels,
                    datasets: [{
                        data: values,
                        backgroundColor: ['#6366f1', '#f59e0b', '#10b981', '#ef4444', '#94a3b8'],
                        hoverOffset: 4,
                        borderRadius: 5
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { position: 'bottom', labels: { boxWidth: 8, padding: 15, font: { size: 10 } } }
                    },
                    cutout: '75%'
                }
            });
        }

        function deleteRecord(id) {
            expenses = expenses.filter(e => String(e.id) !== String(id));
            updateUI();
        }

        function clearAll() {
            if(confirm('警告：這會永久刪除手機中的所有記帳紀錄，確定嗎？')) {
                expenses = [];
                updateUI();
            }
        }

        function exportCSV() {
            if (expenses.length === 0) return alert('目前沒有紀錄可匯出');
            let csvContent = "\uFEFF日期,項目,金額,分類\n";
            expenses.forEach(e => {
                csvContent += `${new Date(e.date).toLocaleString()},${e.item},${e.amount},${e.category}\n`;
            });
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            const url = URL.createObjectURL(blob);
            link.setAttribute("href", url);
            link.setAttribute("download", `記帳備份_${new Date().toLocaleDateString()}.csv`);
            link.style.visibility = 'hidden';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        // 語音辨識邏輯
        const voiceBtn = document.getElementById('voiceBtn');
        const toast = document.getElementById('toast');
        const liveResult = document.getElementById('liveResult');
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

        if (SpeechRecognition) {
            const recognition = new SpeechRecognition();
            recognition.lang = 'zh-TW';
            recognition.interimResults = true; // 開啟即時結果顯示

            voiceBtn.addEventListener('click', () => {
                try {
                    recognition.start();
                    voiceBtn.classList.add('recording', 'bg-red-500');
                    toast.classList.remove('hidden');
                    liveResult.innerText = '正在傾聽...';
                } catch(e) {
                    console.log("Recognition already started");
                }
            });

            recognition.onresult = (event) => {
                const transcript = Array.from(event.results)
                    .map(result => result[0].transcript)
                    .join('');
                liveResult.innerText = transcript;
                
                if (event.results[0].isFinal) {
                    processVoiceCommand(transcript);
                }
            };

            recognition.onend = () => {
                voiceBtn.classList.remove('recording', 'bg-red-500');
                setTimeout(() => toast.classList.add('hidden'), 1000);
            };

            recognition.onerror = (e) => {
                console.error(e);
                toast.classList.add('hidden');
                if(e.error === 'not-allowed') alert('請允許瀏覽器存取麥克風權限以使用語音功能。');
            };
        } else {
            document.getElementById('hintText').innerText = "您的瀏覽器不支援語音辨識";
            voiceBtn.style.opacity = "0.5";
        }

        function processVoiceCommand(text) {
            // 解析金額：支援「120」、「一百二十」等數字（Speech API 通常會轉成數字）
            const amountMatch = text.match(/\d+/);
            if (!amountMatch) return;

            const amount = parseInt(amountMatch[0]);
            // 過濾掉金額和常見單位詞，剩下的視為品項
            let item = text.replace(amountMatch[0], '').replace(/元|塊|錢/g, '').trim();
            
            if (!item) item = "未命名支出";

            // 自動分類邏輯
            let category = '其他';
            for (const [cat, keywords] of Object.entries(categories)) {
                if (keywords.some(k => item.includes(k))) {
                    category = cat;
                    break;
                }
            }

            const newExpense = {
                id: Date.now().toString(),
                item,
                amount,
                category,
                date: new Date().toISOString()
            };

            expenses.push(newExpense);
            updateUI();
            
            if (navigator.vibrate) navigator.vibrate([50, 30, 50]);
        }
    </script>
</body>
</html>
