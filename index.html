<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EASY Finance - 旅程詳情面板</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=Montserrat:wght@700;900&display=swap');
        
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8fafc; -webkit-tap-highlight-color: transparent; }
        .font-mont { font-family: 'Montserrat', sans-serif; }
        
        .glass-nav {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-top: 1px solid rgba(255, 255, 255, 0.3);
        }

        .card-shadow {
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.03);
        }

        .progress-glow {
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.3);
        }

        .page { display: none; }
        .page-active { display: block; animation: slideUp 0.4s cubic-bezier(0.22, 1, 0.36, 1); }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .mic-active {
            box-shadow: 0 0 0 0 rgba(244, 63, 94, 0.7);
            animation: ring 1.5s infinite;
        }

        @keyframes ring {
            70% { box-shadow: 0 0 0 20px rgba(244, 63, 94, 0); }
            100% { box-shadow: 0 0 0 0 rgba(244, 63, 94, 0); }
        }

        /* 骨架屏動畫 */
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        .loading-shimmer {
            background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 50%, #f1f5f9 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
    </style>
</head>
<body class="pb-32">

    <!-- 主頁 (Dashboard) -->
    <div id="home-page" class="page page-active p-6">
        <header class="flex justify-between items-center mb-6">
            <div>
                <h2 class="text-slate-400 text-[10px] font-black uppercase tracking-widest">Personal Budget</h2>
                <h1 class="text-2xl font-black text-slate-800 font-mont">Dashboard</h1>
            </div>
            <div class="flex gap-2">
                <button onclick="exportData()" class="p-3 bg-white rounded-2xl card-shadow active:scale-90 transition">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-indigo-600" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a2 2 0 002 2h12a2 2 0 002-2v-1m-4-4l-4 4m0 0l-4-4m4 4V4" /></svg>
                </button>
            </div>
        </header>

        <!-- 當前旅程快捷 Banner -->
        <div id="activeTripBanner" class="hidden mb-6 bg-indigo-600 p-4 rounded-[2rem] shadow-lg shadow-indigo-100 flex justify-between items-center text-white">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-white/20 rounded-xl flex items-center justify-center text-xl">✈️</div>
                <div>
                    <p id="activeTripName" class="text-xs font-black opacity-80">載入中...</p>
                    <p id="activeTripRate" class="text-sm font-bold">匯率獲取中...</p>
                </div>
            </div>
            <button onclick="switchPage('trips')" class="bg-white/20 px-3 py-1 rounded-full text-[10px] font-black backdrop-blur-sm">查看詳情</button>
        </div>

        <!-- 預算卡片 -->
        <section class="bg-white p-6 rounded-[2.5rem] card-shadow mb-8 border border-slate-50 relative overflow-hidden">
            <div class="flex justify-between items-end mb-4 relative z-10">
                <div>
                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-tighter">本月預算執行</p>
                    <h3 id="budgetStatusText" class="text-lg font-bold text-slate-800">計算中...</h3>
                </div>
                <div class="text-right">
                    <span id="currentSpendText" class="text-xl font-black font-mont text-indigo-600">$0</span>
                    <span class="text-slate-300 font-bold"> / </span>
                    <button onclick="setBudget()" id="budgetTargetText" class="text-slate-400 font-bold hover:text-indigo-500 underline decoration-dotted font-mont">$5,000</button>
                </div>
            </div>
            <div class="w-full h-3 bg-slate-100 rounded-full overflow-hidden relative z-10">
                <div id="budgetBar" class="h-full bg-indigo-500 transition-all duration-700 progress-glow" style="width: 0%"></div>
            </div>
        </section>

        <!-- 最近紀錄 -->
        <section>
            <div class="flex justify-between items-center mb-4 px-2">
                <h3 class="text-slate-800 font-black text-sm">最近紀錄</h3>
                <button onclick="clearData()" class="text-[10px] font-bold text-rose-400">清空</button>
            </div>
            <div id="recentList" class="space-y-3"></div>
        </section>
    </div>

    <!-- 旅程頁 (Trips) -->
    <div id="trips-page" class="page p-6">
        <header class="mb-6 flex justify-between items-end">
            <div>
                <h2 class="text-slate-400 text-[10px] font-black uppercase tracking-widest">Travel Management</h2>
                <h1 class="text-2xl font-black text-slate-800 font-mont">Trips</h1>
            </div>
            <button onclick="addTrip()" class="px-4 py-2 bg-indigo-600 text-white text-[10px] font-black rounded-full shadow-lg">新增旅程</button>
        </header>

        <!-- 旅程列表 -->
        <div id="tripsList" class="space-y-4"></div>

        <!-- 旅程詳情面板 (由 JS 動態展開) -->
        <div id="tripDetailOverlay" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[60] hidden flex flex-col justify-end">
            <div class="bg-white rounded-t-[3rem] w-full max-h-[90vh] overflow-y-auto p-8 animate-slideUp">
                <div class="w-12 h-1.5 bg-slate-200 rounded-full mx-auto mb-8" onclick="closeTripDetail()"></div>
                
                <div id="tripDetailContent">
                    <!-- 動態內容插槽 -->
                </div>
                
                <button onclick="closeTripDetail()" class="w-full py-4 mt-8 bg-slate-100 text-slate-400 font-black rounded-[2rem] text-sm">關閉面板</button>
            </div>
        </div>
    </div>

    <!-- 分析頁 (Stats) -->
    <div id="stats-page" class="page p-6">
        <header class="mb-8">
            <h2 class="text-slate-400 text-[10px] font-black uppercase tracking-widest">Financial Reports</h2>
            <h1 class="text-2xl font-black text-slate-800 font-mont">Statistics</h1>
        </header>
        <div class="bg-white p-6 rounded-[2.5rem] card-shadow border border-slate-50 mb-6">
            <canvas id="mainChart" class="h-44"></canvas>
        </div>
        <div id="categoryStats" class="space-y-4"></div>
    </div>

    <!-- 導覽列 -->
    <nav class="fixed bottom-6 left-6 right-6 h-20 glass-nav rounded-[2.5rem] card-shadow z-50 flex justify-around items-center px-4">
        <button onclick="switchPage('home')" id="nav-home" class="flex flex-col items-center gap-1 text-indigo-600 transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" /></svg>
            <span class="text-[9px] font-black">概覽</span>
        </button>
        <button onclick="switchPage('trips')" id="nav-trips" class="flex flex-col items-center gap-1 text-slate-300 transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3.055 11H5a2 2 0 012 2v1a2 2 0 002 2 2 2 0 012 2v2.945M8 3.935V5.5A2.5 2.5 0 0010.5 8h.5a2 2 0 012 2 2 2 0 002 2h2.935M11 20c4.97 0 9-4.03 9-9s-4.03-9-9-9-9 4.03-9 9 4.03 9 9 9z" /></svg>
            <span class="text-[9px] font-black">旅程</span>
        </button>
        <div class="relative -top-8">
            <button id="micBtn" class="w-16 h-16 bg-rose-500 rounded-full shadow-lg shadow-rose-200 flex items-center justify-center text-white active:scale-95 transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z" /></svg>
            </button>
        </div>
        <button onclick="switchPage('stats')" id="nav-stats" class="flex flex-col items-center gap-1 text-slate-300 transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" /></svg>
            <span class="text-[9px] font-black">統計</span>
        </button>
    </nav>

    <!-- 錄音浮窗 -->
    <div id="micOverlay" class="fixed inset-0 bg-slate-900/90 backdrop-blur-md z-[100] flex flex-col items-center justify-center text-white hidden">
        <div class="w-24 h-24 bg-rose-500 rounded-full flex items-center justify-center mb-8 mic-active">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z" /></svg>
        </div>
        <p class="text-xl font-bold mb-2">正在聆聽...</p>
        <p id="liveText" class="text-slate-400 px-10 text-center italic text-sm">請說出內容與金額，例如「拉麵 1500」</p>
        <button onclick="closeMic()" class="mt-12 text-slate-500 text-xs font-bold border border-slate-700 px-6 py-2 rounded-full">取消</button>
    </div>

    <script>
        // 核心狀態
        let state = {
            expenses: JSON.parse(localStorage.getItem('expenses_v2')) || [],
            trips: JSON.parse(localStorage.getItem('trips_v2')) || [],
            activeTripId: localStorage.getItem('active_trip_id') || null,
            monthlyBudget: parseInt(localStorage.getItem('monthly_budget')) || 5000,
            exchangeRates: { 'JPY': 0.052, 'TWD': 0.24, 'KRW': 0.0058, 'USD': 7.82, 'EUR': 8.5 },
            chart: null
        };

        const CATEGORIES = {
            '飲食': { emoji: '🍛', color: '#f59e0b', keys: ['餐', '食', '飯', '飲', '咖', '茶', '拉麵', '壽司', '甜', '餅'] },
            '交通': { emoji: '🚌', color: '#3b82f6', keys: ['車', '地鐵', '巴', '的士', 'Uber', 'JR', '飛機', '油', '泊'] },
            '娛樂': { emoji: '🎮', color: '#8b5cf6', keys: ['玩', '戲', 'Game', '唱', '迪士尼', '門票', '展', '卡'] },
            '生活': { emoji: '🏠', color: '#ec4899', keys: ['買', '衫', '水電', '租', '藥', '酒店', '藥妝', '網購', '超市'] },
            '其他': { emoji: '✨', color: '#94a3b8', keys: [] }
        };

        window.onload = () => init();

        function init() {
            simulateExchangeRateUpdate();
            updateDashboard();
        }

        function saveData() {
            localStorage.setItem('expenses_v2', JSON.stringify(state.expenses));
            localStorage.setItem('trips_v2', JSON.stringify(state.trips));
            localStorage.setItem('active_trip_id', state.activeTripId);
        }

        // 模擬當日匯率自動更新
        function simulateExchangeRateUpdate() {
            // 隨機微調匯率模擬「更新」
            Object.keys(state.exchangeRates).forEach(currency => {
                const change = (Math.random() - 0.5) * 0.001; 
                state.exchangeRates[currency] = parseFloat((state.exchangeRates[currency] + change).toFixed(4));
            });
            console.log("今日匯率已更新:", state.exchangeRates);
        }

        function switchPage(page) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('page-active'));
            document.getElementById(page + '-page').classList.add('page-active');
            ['home', 'trips', 'stats'].forEach(p => {
                const nav = document.getElementById('nav-' + p);
                if(nav) {
                    nav.classList.toggle('text-indigo-600', page === p);
                    nav.classList.toggle('text-slate-300', page !== p);
                }
            });
            if(page === 'home') updateDashboard();
            if(page === 'trips') renderTrips();
            if(page === 'stats') { renderStats(); renderChart(); }
        }

        function updateDashboard() {
            const now = new Date();
            const thisMonthExpenses = state.expenses.filter(e => {
                const d = new Date(e.date);
                return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
            });
            const total = thisMonthExpenses.reduce((sum, e) => sum + e.amount, 0);
            document.getElementById('currentSpendText').innerText = `$${Math.round(total).toLocaleString()}`;
            document.getElementById('budgetTargetText').innerText = `$${state.monthlyBudget.toLocaleString()}`;
            
            const percent = Math.min((total / state.monthlyBudget) * 100, 100);
            document.getElementById('budgetBar').style.width = percent + '%';
            document.getElementById('budgetStatusText').innerText = percent >= 100 ? '預算超標' : '預算充裕';

            const activeTrip = state.trips.find(t => t.id === state.activeTripId);
            const banner = document.getElementById('activeTripBanner');
            if(activeTrip) {
                banner.classList.remove('hidden');
                document.getElementById('activeTripName').innerText = `正在進行：${activeTrip.name}`;
                document.getElementById('activeTripRate').innerText = `當前匯率 1:${activeTrip.rate} (今日已同步)`;
            } else {
                banner.classList.add('hidden');
            }

            const list = document.getElementById('recentList');
            list.innerHTML = '';
            const recent = [...state.expenses].sort((a,b) => new Date(b.date) - new Date(a.date)).slice(0, 5);
            recent.forEach(e => {
                const cat = CATEGORIES[e.category] || CATEGORIES['其他'];
                const card = document.createElement('div');
                card.className = "bg-white p-4 rounded-3xl card-shadow flex justify-between items-center border border-slate-50";
                card.innerHTML = `
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 bg-slate-50 rounded-2xl flex items-center justify-center text-lg">${cat.emoji}</div>
                        <div>
                            <p class="font-bold text-slate-800 text-sm">${e.item}</p>
                            <p class="text-[8px] text-slate-400 font-bold">${new Date(e.date).toLocaleDateString()} ${e.tripName ? '• 📍'+e.tripName : ''}</p>
                        </div>
                    </div>
                    <div class="text-right">
                        <p class="font-black text-slate-800 font-mont">$${Math.round(e.amount).toLocaleString()}</p>
                        ${e.originalAmount ? `<p class="text-[8px] text-slate-300 font-bold">${e.originalAmount} 外幣</p>` : ''}
                    </div>
                `;
                list.appendChild(card);
            });
        }

        // 旅程頁邏輯
        function renderTrips() {
            const list = document.getElementById('tripsList');
            list.innerHTML = '';
            state.trips.forEach(t => {
                const isActive = state.activeTripId === t.id;
                const card = document.createElement('div');
                card.className = `bg-white p-5 rounded-[2.5rem] card-shadow border-2 transition-all ${isActive ? 'border-indigo-600' : 'border-transparent'}`;
                card.onclick = () => openTripDetail(t.id);
                card.innerHTML = `
                    <div class="flex justify-between items-center">
                        <div class="flex items-center gap-4">
                            <div class="w-12 h-12 bg-indigo-50 text-indigo-600 rounded-2xl flex items-center justify-center text-xl">✈️</div>
                            <div>
                                <h3 class="font-black text-slate-800">${t.name}</h3>
                                <p class="text-[10px] text-slate-400 font-bold">1 外幣 = ${t.rate} HKD</p>
                            </div>
                        </div>
                        ${isActive ? '<span class="px-3 py-1 bg-indigo-600 text-white text-[9px] font-black rounded-full">進行中</span>' : '<span class="text-[10px] text-slate-300 font-bold italic">點擊查看詳情</span>'}
                    </div>
                `;
                list.appendChild(card);
            });
        }

        function openTripDetail(tripId) {
            const trip = state.trips.find(t => t.id === tripId);
            const tripExpenses = state.expenses.filter(e => e.tripName === trip.name);
            const totalHKD = tripExpenses.reduce((s,e) => s+e.amount, 0);
            
            const overlay = document.getElementById('tripDetailOverlay');
            const content = document.getElementById('tripDetailContent');
            
            overlay.classList.remove('hidden');
            content.innerHTML = `
                <div class="flex justify-between items-start mb-6">
                    <div>
                        <h2 class="text-3xl font-black text-slate-800">${trip.name}</h2>
                        <p class="text-xs text-indigo-600 font-black mt-1 uppercase tracking-widest">Trip Report</p>
                    </div>
                    <button onclick="toggleActiveTrip('${trip.id}')" class="px-4 py-2 ${state.activeTripId === trip.id ? 'bg-rose-50 text-rose-500' : 'bg-indigo-600 text-white'} text-[10px] font-black rounded-full transition-all">
                        ${state.activeTripId === trip.id ? '停用外幣模式' : '啟用外幣模式'}
                    </button>
                </div>

                <div class="grid grid-cols-2 gap-4 mb-8">
                    <div class="bg-slate-50 p-5 rounded-[2rem]">
                        <p class="text-[9px] font-black text-slate-400 uppercase mb-1">總開支 (HKD)</p>
                        <p class="text-xl font-black text-slate-800 font-mont">$${Math.round(totalHKD).toLocaleString()}</p>
                    </div>
                    <div class="bg-slate-50 p-5 rounded-[2rem]">
                        <p class="text-[9px] font-black text-slate-400 uppercase mb-1">今日同步匯率</p>
                        <p class="text-xl font-black text-indigo-600 font-mont">1 : ${trip.rate}</p>
                    </div>
                </div>

                <div class="mb-8">
                    <h4 class="text-xs font-black text-slate-800 mb-4 flex items-center gap-2">
                        <span class="w-1.5 h-3 bg-indigo-500 rounded-full"></span> 開支分布 (HKD)
                    </h4>
                    <div class="space-y-3">
                        ${Object.keys(CATEGORIES).map(cat => {
                            const sum = tripExpenses.filter(e => e.category === cat).reduce((s,e)=>s+e.amount, 0);
                            if(sum === 0) return '';
                            const perc = Math.round((sum/totalHKD)*100);
                            return `
                                <div class="flex items-center gap-3">
                                    <span class="text-sm">${CATEGORIES[cat].emoji}</span>
                                    <div class="flex-1 h-2 bg-slate-100 rounded-full overflow-hidden">
                                        <div class="h-full" style="width: ${perc}%; background-color: ${CATEGORIES[cat].color}"></div>
                                    </div>
                                    <span class="text-[10px] font-black text-slate-400 w-12 text-right">$${Math.round(sum)}</span>
                                </div>
                            `;
                        }).join('') || '<p class="text-center py-4 text-slate-300 text-[10px] italic">此旅程尚無開支記錄</p>'}
                    </div>
                </div>

                <div class="flex gap-3">
                    <button onclick="deleteTrip('${trip.id}')" class="flex-1 py-4 bg-rose-50 text-rose-500 font-black rounded-[2rem] text-sm">刪除旅程</button>
                    <button onclick="updateTripRate('${trip.id}')" class="flex-1 py-4 bg-indigo-50 text-indigo-600 font-black rounded-[2rem] text-sm">手動更正匯率</button>
                </div>
            `;
        }

        function closeTripDetail() {
            document.getElementById('tripDetailOverlay').classList.add('hidden');
        }

        function toggleActiveTrip(id) {
            state.activeTripId = (state.activeTripId === id) ? null : id;
            saveData();
            closeTripDetail();
            renderTrips();
            updateDashboard();
        }

        function addTrip() {
            const name = prompt("旅程名稱 (例如: 日本、台灣)：");
            if(!name) return;
            const currency = prompt("幣別代碼 (例如: JPY, TWD, USD) 以獲取建議匯率：", "JPY").toUpperCase();
            const suggestRate = state.exchangeRates[currency] || 0.052;
            const rate = parseFloat(prompt(`確認匯率 (1 ${currency} 等於多少港幣？)：`, suggestRate));
            if(isNaN(rate)) return;
            state.trips.push({ id: 't_'+Date.now(), name, rate, currency, date: new Date().toISOString() });
            saveData();
            renderTrips();
        }

        function updateTripRate(id) {
            const trip = state.trips.find(t => t.id === id);
            const newRate = parseFloat(prompt("輸入新匯率 (1 外幣 = ? HKD)：", trip.rate));
            if(!isNaN(newRate)) {
                trip.rate = newRate;
                saveData();
                openTripDetail(id); // 刷新面板
                renderTrips();
            }
        }

        function deleteTrip(id) {
            if(confirm('確定刪除此旅程記錄？')) {
                state.trips = state.trips.filter(t => t.id !== id);
                if(state.activeTripId === id) state.activeTripId = null;
                saveData();
                closeTripDetail();
                renderTrips();
                updateDashboard();
            }
        }

        // 語音錄入處理
        const micBtn = document.getElementById('micBtn');
        const overlay = document.getElementById('micOverlay');
        const liveText = document.getElementById('liveText');
        let recognition = null;

        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRec();
            recognition.lang = 'zh-HK';
            recognition.onresult = (e) => {
                const text = e.results[0][0].transcript;
                liveText.innerText = `辨識中：${text}`;
                processVoice(text);
            };
            recognition.onend = () => setTimeout(closeMic, 800);
        }

        micBtn.onclick = () => { overlay.classList.remove('hidden'); recognition.start(); };
        function closeMic() { overlay.classList.add('hidden'); recognition.stop(); }

        function processVoice(text) {
            const numbers = text.match(/\d+(\.\d+)?/g);
            if(!numbers) return;
            const val = parseFloat(numbers[0]);
            let hkd = val;
            let tripName = null;
            let original = null;

            const active = state.trips.find(t => t.id === state.activeTripId);
            if(active) {
                hkd = val * active.rate;
                tripName = active.name;
                original = val;
            }

            let item = text.replace(numbers[0], '').replace(/元|塊|蚊|hkd|jpy/gi, '').trim() || "語音錄入";
            let category = '其他';
            for (const [name, info] of Object.entries(CATEGORIES)) {
                if (info.keys.some(k => item.includes(k))) { category = name; break; }
            }

            state.expenses.push({ id: Date.now(), item, amount: hkd, originalAmount: original, tripName, category, date: new Date().toISOString() });
            saveData();
            updateDashboard();
        }

        // 統計圖表
        function renderChart() {
            const ctx = document.getElementById('mainChart').getContext('2d');
            const dataMap = {};
            Object.keys(CATEGORIES).forEach(k => dataMap[k] = 0);
            state.expenses.forEach(e => { if(dataMap[e.category] !== undefined) dataMap[e.category] += e.amount; });
            const labels = Object.keys(dataMap).filter(k => dataMap[k] > 0);
            const data = labels.map(l => dataMap[l]);
            if(state.chart) state.chart.destroy();
            state.chart = new Chart(ctx, {
                type: 'doughnut',
                data: { labels, datasets: [{ data, backgroundColor: labels.map(l => CATEGORIES[l].color), borderWidth: 0 }] },
                options: { maintainAspectRatio: false, plugins: { legend: { position: 'right' } }, cutout: '75%' }
            });
        }

        function renderStats() {
            const container = document.getElementById('categoryStats');
            container.innerHTML = '';
            const total = state.expenses.reduce((s,e)=>s+e.amount, 0);
            Object.keys(CATEGORIES).forEach(name => {
                const sum = state.expenses.filter(e => e.category === name).reduce((s,e)=>s+e.amount, 0);
                if(sum === 0) return;
                const perc = Math.round((sum/total)*100);
                const div = document.createElement('div');
                div.className = "bg-white p-5 rounded-[2rem] card-shadow";
                div.innerHTML = `
                    <div class="flex justify-between items-center mb-2">
                        <div class="flex items-center gap-2"><span class="text-xl">${CATEGORIES[name].emoji}</span><span class="font-bold text-slate-800 text-xs">${name}</span></div>
                        <span class="font-black font-mont text-indigo-600 text-xs">$${Math.round(sum).toLocaleString()}</span>
                    </div>
                    <div class="w-full h-1.5 bg-slate-100 rounded-full overflow-hidden">
                        <div class="h-full" style="width: ${perc}%; background-color: ${CATEGORIES[name].color}"></div>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function setBudget() {
            const val = prompt("每月預算 (HKD)：", state.monthlyBudget);
            if(val) { state.monthlyBudget = parseInt(val); localStorage.setItem('monthly_budget', val); updateDashboard(); }
        }

        function exportData() {
            let csv = "\uFEFF日期,項目,金額,旅程\n";
            state.expenses.forEach(e => csv += `${new Date(e.date).toLocaleDateString()},${e.item},${Math.round(e.amount)},${e.tripName || ''}\n`);
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = "支出報表.csv";
            link.click();
        }

        function clearData() {
            if(confirm('清空所有記帳？')) { state.expenses = []; saveData(); updateDashboard(); }
        }
    </script>
</body>
</html>
