<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EASY App - 行程紀錄</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; -webkit-tap-highlight-color: transparent; }
        .recording { animation: pulse 1.5s infinite; }
        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { transform: scale(1.1); box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }
        .modal { transition: opacity 0.25s ease; }
        .page { display: none; }
        .page-active { display: block; }
        .calendar-day.selected { background-color: #4f46e5; color: white; border-radius: 9999px; }
        .has-expense::after { content: ''; display: block; width: 4px; height: 4px; background: #ef4444; border-radius: 50%; margin: 2px auto 0; }
        .trip-card { background: linear-gradient(135deg, #6366f1 0%, #4338ca 100%); transition: transform 0.2s; }
        .trip-card:active { transform: scale(0.98); }
        .accordion-content { max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out; }
        .accordion-active .accordion-content { max-height: 2000px; }
        .accordion-active .chevron { transform: rotate(180deg); }
        .chevron { transition: transform 0.3s; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-24">

    <!-- 頁面 1: 總覽 (Home) -->
    <div id="page-home" class="page page-active">
        <header class="bg-indigo-600 text-white p-6 rounded-b-3xl shadow-lg sticky top-0 z-10">
            <div class="flex justify-between items-start">
                <div>
                    <h1 class="text-xl font-bold">EASY</h1>
                    <p class="text-indigo-100 text-sm opacity-80" id="currentDate"></p>
                </div>
                <div class="flex gap-2">
                    <button onclick="openManualInput()" class="bg-white/20 px-3 py-1 rounded-full text-xs hover:bg-white/30 transition">手動</button>
                    <button onclick="exportCSV()" class="bg-white/20 px-3 py-1 rounded-full text-xs hover:bg-white/30 transition">匯出備份</button>
                </div>
            </div>
            
            <div class="mt-4 grid grid-cols-2 gap-4">
                <div class="bg-white/20 p-3 rounded-2xl">
                    <p class="text-xs">今日支出 (HKD)</p>
                    <p class="text-lg font-bold" id="todayTotal">$0</p>
                </div>
                <div class="bg-white/20 p-3 rounded-2xl">
                    <p class="text-xs">本月累計 (HKD)</p>
                    <p class="text-lg font-bold" id="monthTotal">$0</p>
                </div>
            </div>
        </header>

        <main class="p-4 space-y-6">
            <section class="bg-white p-4 rounded-2xl shadow-sm">
                <div class="flex justify-between items-center mb-2">
                    <h2 class="text-gray-500 text-sm font-medium">支出比例</h2>
                    <span id="chartFallback" class="text-[10px] text-gray-300 hidden">暫無資料</span>
                </div>
                <div class="h-44 flex justify-center">
                    <canvas id="categoryChart"></canvas>
                </div>
            </section>

            <section>
                <div class="flex justify-between items-center mb-3">
                    <h2 class="text-gray-700 font-bold italic">最近紀錄</h2>
                    <button onclick="clearAll()" class="text-xs text-red-400 font-medium">清除全部</button>
                </div>
                <div id="expenseList" class="space-y-3"></div>
            </section>
        </main>
    </div>

    <!-- 頁面 2: 日曆 (Calendar) -->
    <div id="page-calendar" class="page">
        <header class="bg-indigo-600 text-white p-6 rounded-b-3xl shadow-lg sticky top-0 z-10">
            <h1 class="text-xl font-bold">收支日曆</h1>
            <p class="text-indigo-100 text-sm opacity-80" id="calendarMonthTitle"></p>
        </header>
        <main class="p-4 space-y-4">
            <div class="bg-white p-4 rounded-2xl shadow-sm">
                <div class="grid grid-cols-7 text-center text-xs text-gray-400 mb-2">
                    <div>日</div><div>一</div><div>二</div><div>三</div><div>四</div><div>五</div><div>六</div>
                </div>
                <div id="calendarGrid" class="grid grid-cols-7 gap-y-2 text-center text-sm font-medium"></div>
            </div>
            <section>
                <h2 id="selectedDayLabel" class="text-gray-700 font-bold mb-3">選擇日期</h2>
                <div id="dayExpenseList" class="space-y-3"></div>
            </section>
        </main>
    </div>

    <!-- 頁面 3: 旅行 (Trip) -->
    <div id="page-trip" class="page">
        <header class="bg-indigo-600 text-white p-6 rounded-b-3xl shadow-lg sticky top-0 z-10">
            <div class="flex justify-between items-center">
                <h1 class="text-xl font-bold">旅行行程</h1>
                <button id="addTripBtn" onclick="openTripModal()" class="bg-white/20 px-3 py-1 rounded-full text-xs">新增行程</button>
            </div>
        </header>
        <main class="p-4 space-y-6">
            <!-- 當前行程 -->
            <div id="activeTripSection">
                <div id="activeTripContainer" class="cursor-pointer"></div>
                <div id="tripActionArea" class="hidden flex gap-3 mt-4">
                    <button onclick="openManualInput()" class="flex-1 bg-white border border-indigo-100 py-3 rounded-2xl shadow-sm flex items-center justify-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-indigo-600" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" /></svg>
                        <span class="text-sm font-bold text-gray-700">記錄一筆</span>
                    </button>
                    <button onclick="startVoiceRecognition()" class="flex-1 bg-white border border-indigo-100 py-3 rounded-2xl shadow-sm flex items-center justify-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-red-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z" /></svg>
                        <span class="text-sm font-bold text-gray-700">語音輸入</span>
                    </button>
                </div>
            </div>

            <!-- 當前行程明細 (僅在有 activeTrip 時顯示) -->
            <section id="activeTripDetail" class="hidden">
                <div class="flex justify-between items-center mb-3">
                    <h2 class="text-gray-700 font-bold italic">當前行程明細</h2>
                </div>
                <div id="tripExpenseList" class="space-y-3"></div>
            </section>

            <!-- 過往行程 (摺疊形式) -->
            <section>
                <h2 class="text-gray-400 text-xs font-bold uppercase tracking-widest mb-3">過往行程紀錄</h2>
                <div id="pastTripsList" class="space-y-3"></div>
            </section>
        </main>
    </div>

    <!-- 旅行編輯 Modal -->
    <div id="tripModal" class="modal fixed inset-0 z-50 flex items-center justify-center opacity-0 pointer-events-none">
        <div class="absolute inset-0 bg-black/50 backdrop-blur-sm" onclick="closeTripModal()"></div>
        <div class="bg-white w-11/12 max-sm rounded-3xl p-6 relative z-10 shadow-2xl max-h-[90vh] overflow-y-auto">
            <h3 class="text-lg font-bold mb-4">建立新行程</h3>
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] text-gray-400 mb-1 block">目的地</label>
                    <input id="tripDest" type="text" class="w-full bg-slate-100 border-none rounded-xl p-3 outline-none" placeholder="如: 大阪">
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label class="text-[10px] text-gray-400 mb-1 block">開始日期</label>
                        <input id="tripStart" type="date" class="w-full bg-slate-100 border-none rounded-xl p-2 text-xs outline-none">
                    </div>
                    <div>
                        <label class="text-[10px] text-gray-400 mb-1 block">結束日期</label>
                        <input id="tripEnd" type="date" class="w-full bg-slate-100 border-none rounded-xl p-2 text-xs outline-none">
                    </div>
                </div>
                <div class="flex gap-2">
                    <select id="tripCurrencyCode" onchange="fetchExchangeRate()" class="flex-1 bg-slate-100 border-none rounded-xl p-3 outline-none text-sm">
                        <option value="">選擇外幣</option>
                        <option value="JPY">日圓 JPY</option>
                        <option value="TWD">台幣 TWD</option>
                        <option value="KRW">韓圓 KRW</option>
                        <option value="THB">泰銖 THB</option>
                        <option value="CNY">人民幣 CNY</option>
                        <option value="USD">美金 USD</option>
                        <option value="EUR">歐元 EUR</option>
                        <option value="GBP">英鎊 GBP</option>
                    </select>
                    <input id="tripCurrencySymbol" type="text" class="w-16 bg-slate-100 border-none rounded-xl p-3 outline-none text-center" placeholder="符號">
                </div>
                <div class="relative">
                    <input id="tripRate" type="number" step="0.000001" class="w-full bg-slate-100 border-none rounded-xl p-3 outline-none" placeholder="匯率 (1外幣 = ? HKD)">
                    <span id="rateLoading" class="hidden absolute right-3 top-3 animate-spin">⌛</span>
                </div>
                <button onclick="saveTrip()" class="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold mt-2">開始行程</button>
            </div>
        </div>
    </div>

    <!-- 支出編輯 Modal -->
    <div id="editModal" class="modal fixed inset-0 z-50 flex items-center justify-center opacity-0 pointer-events-none">
        <div class="absolute inset-0 bg-black/50 backdrop-blur-sm" onclick="closeModal()"></div>
        <div class="bg-white w-11/12 max-w-sm rounded-3xl p-6 relative z-10 shadow-2xl">
            <h3 id="modalTitle" class="text-lg font-bold text-gray-800 mb-4">編輯紀錄</h3>
            <div class="space-y-4">
                <input id="editItem" type="text" class="w-full bg-slate-100 border-none rounded-xl p-3 outline-none" placeholder="項目 (如: 拉麵)">
                <div class="flex gap-2">
                    <input id="editAmount" type="number" class="w-full bg-slate-100 border-none rounded-xl p-3 outline-none" placeholder="金額">
                    <select id="isForeign" class="bg-slate-100 border-none rounded-xl px-2 text-xs outline-none">
                        <option value="0">HKD</option><option value="1">外幣</option>
                    </select>
                </div>
                <select id="editCategory" class="w-full bg-slate-100 border-none rounded-xl p-3 outline-none">
                    <option value="飲食">飲食</option><option value="交通">交通</option><option value="娛樂">娛樂</option><option value="生活">生活</option><option value="其他">其他</option>
                </select>
                <div class="flex gap-2">
                    <button onclick="saveEdit()" class="flex-1 bg-indigo-600 text-white py-3 rounded-xl font-bold">儲存</button>
                    <button onclick="deleteRecordFromModal()" class="flex-1 bg-red-50 text-red-500 py-3 rounded-xl font-bold text-sm">刪除</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 底部導覽列 -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-100 flex justify-around items-center py-2 pb-safe z-40">
        <button onclick="switchPage('home')" id="nav-home" class="flex flex-col items-center p-2 text-indigo-600">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" /></svg>
            <span class="text-[10px] mt-1 font-bold">總覽</span>
        </button>
        <button onclick="switchPage('calendar')" id="nav-calendar" class="flex flex-col items-center p-2 text-gray-400">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2-2v12a2 2 0 002 2z" /></svg>
            <span class="text-[10px] mt-1 font-bold">日曆</span>
        </button>
        <div class="relative -top-4">
            <button id="voiceBtn" class="bg-indigo-600 text-white w-14 h-14 rounded-full shadow-xl flex items-center justify-center transition-all active:scale-90">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z" /></svg>
            </button>
        </div>
        <button onclick="switchPage('trip')" id="nav-trip" class="flex flex-col items-center p-2 text-gray-400">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3.055 11H5a2 2 0 012 2v1a2 2 0 002 2 2 2 0 012 2v2.945M8 3.935V5.5A2.5 2.5 0 0010.5 8h.5a2 2 0 012 2 2 2 0 104 0 2 2 0 012-2h1.064M15 20.488V18a2 2 0 012-2h3.064M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
            <span class="text-[10px] mt-1 font-bold">旅行</span>
        </button>
    </nav>

    <!-- 語音狀態提示 -->
    <div id="toast" class="fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 z-50 bg-black/80 text-white px-6 py-4 rounded-3xl hidden text-center shadow-2xl">
        <div class="flex flex-col items-center">
            <div class="w-3 h-3 bg-red-500 rounded-full animate-ping mb-2"></div>
            <p class="font-bold text-sm">正在傾聽...</p>
            <p id="liveResult" class="text-xs opacity-60 mt-2">請說出項目和金額</p>
        </div>
    </div>

    <script>
        // 初始化數據
        let expenses = JSON.parse(localStorage.getItem('expenses')) || [];
        let trips = JSON.parse(localStorage.getItem('trips')) || [];
        let activeTrip = trips.find(t => t.active) || null;
        
        let chart = null;
        let currentEditingId = null;
        let selectedDay = new Date();

        const currencySymbols = { JPY: '¥', TWD: '$', KRW: '₩', THB: '฿', CNY: '¥', USD: '$', EUR: '€', GBP: '£' };

        const categories = {
            '飲食': ['餐', '飯', '麵', '飲', '啡', '茶', '早餐', '午餐', '晚餐', '零食', '肉', '菜', '食'],
            '交通': ['車', '地鐵', '巴士', '小巴', '的士', 'Uber', '火車', '票', '油'],
            '娛樂': ['玩', '戲', '唱', 'Game', '運動', '波', '旅遊', '旅行', '入場'],
            '生活': ['買', '藥', '水', '電', '租', '衫', '鞋', '雜貨', '超市', '淘寶', '禮物'],
            '其他': []
        };

        window.onload = () => {
            updateUI();
            document.getElementById('currentDate').innerText = new Date().toLocaleDateString('zh-HK', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' });
            if (activeTrip) refreshActiveTripRate();
        };

        async function fetchExchangeRate() {
            const code = document.getElementById('tripCurrencyCode').value;
            if (!code) return;
            document.getElementById('tripCurrencySymbol').value = currencySymbols[code] || '$';
            const loader = document.getElementById('rateLoading');
            loader.classList.remove('hidden');
            try {
                const res = await fetch(`https://open.er-api.com/v6/latest/HKD`);
                const data = await res.json();
                if (data.result === "success") {
                    const rateToHKD = 1 / data.rates[code];
                    document.getElementById('tripRate').value = rateToHKD.toFixed(6);
                }
            } catch (e) { console.error("匯率失敗", e); } finally { loader.classList.add('hidden'); }
        }

        async function refreshActiveTripRate() {
            if(!activeTrip) return;
            try {
                const res = await fetch(`https://open.er-api.com/v6/latest/HKD`);
                const data = await res.json();
                if (data.result === "success" && activeTrip.currencyCode) {
                    const newRate = 1 / data.rates[activeTrip.currencyCode];
                    activeTrip.rate = parseFloat(newRate.toFixed(6));
                    updateUI();
                }
            } catch (e) {}
        }

        function switchPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('page-active'));
            document.getElementById('page-' + pageId).classList.add('page-active');
            ['home', 'calendar', 'trip'].forEach(id => {
                const nav = document.getElementById('nav-' + id);
                if(nav) { 
                    nav.classList.toggle('text-indigo-600', pageId === id); 
                    nav.classList.toggle('text-gray-400', pageId !== id); 
                }
            });
            if (pageId === 'calendar') renderCalendar();
            if (pageId === 'trip') renderTripView();
            if (pageId === 'home') renderList();
        }

        function updateUI() {
            localStorage.setItem('expenses', JSON.stringify(expenses));
            localStorage.setItem('trips', JSON.stringify(trips));
            updateSummary();
            renderChart();
            if (document.getElementById('page-home').classList.contains('page-active')) renderList();
            if (document.getElementById('page-calendar').classList.contains('page-active')) renderCalendar();
            if (document.getElementById('page-trip').classList.contains('page-active')) renderTripView();
        }

        function updateSummary() {
            const now = new Date();
            const todayStr = now.toLocaleDateString();
            const todaySum = expenses.filter(e => new Date(e.date).toLocaleDateString() === todayStr).reduce((sum, e) => {
                const trip = trips.find(t => t.id === e.tripId);
                const rate = e.isForeign && trip ? trip.rate : 1;
                return sum + (e.amount * rate);
            }, 0);
            const monthSum = expenses.filter(e => {
                const d = new Date(e.date);
                return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
            }).reduce((sum, e) => {
                const trip = trips.find(t => t.id === e.tripId);
                const rate = e.isForeign && trip ? trip.rate : 1;
                return sum + (e.amount * rate);
            }, 0);
            document.getElementById('todayTotal').innerText = `$${Math.round(todaySum).toLocaleString()}`;
            document.getElementById('monthTotal').innerText = `$${Math.round(monthSum).toLocaleString()}`;
        }

        function createExpenseItem(exp) {
            const div = document.createElement('div');
            div.className = "bg-white p-4 rounded-xl shadow-sm flex justify-between items-center active:bg-slate-50 transition cursor-pointer border border-transparent hover:border-indigo-100";
            div.onclick = (e) => { e.stopPropagation(); openEditModal(exp); };
            const trip = trips.find(t => t.id === exp.tripId);
            let amountDisplay = `$${exp.amount}`;
            if(exp.isForeign && trip) {
                amountDisplay = `${trip.currency}${exp.amount} (≈$${Math.round(exp.amount * trip.rate)})`;
            }
            div.innerHTML = `
                <div class="flex items-center space-x-3 pointer-events-none">
                    <div class="w-8 h-8 bg-slate-50 text-slate-500 rounded-lg flex items-center justify-center font-bold text-[8px]">${exp.category}</div>
                    <div><p class="font-bold text-gray-800 text-xs">${exp.item}</p><p class="text-[9px] text-gray-400">${new Date(exp.date).toLocaleTimeString('zh-HK',{hour:'2-digit',minute:'2-digit'})}</p></div>
                </div>
                <div class="text-right pointer-events-none"><p class="font-black text-indigo-600 text-sm">-${amountDisplay}</p></div>
            `;
            return div;
        }

        function renderList() {
            const list = document.getElementById('expenseList');
            if(!list) return;
            list.innerHTML = '';
            const displayData = [...expenses].sort((a,b) => new Date(b.date) - new Date(a.date)).slice(0, 10);
            if(displayData.length === 0) {
                list.innerHTML = '<div class="text-center py-12 text-gray-300 text-xs">暫無紀錄，快去記帳吧！</div>';
                return;
            }
            displayData.forEach(exp => list.appendChild(createExpenseItem(exp)));
        }

        function openManualInput() { 
            currentEditingId = null; 
            document.getElementById('modalTitle').innerText = '手動輸入'; 
            document.getElementById('editItem').value = ''; 
            document.getElementById('editAmount').value = ''; 
            document.getElementById('isForeign').value = activeTrip ? "1" : "0"; 
            toggleModal(true); 
        }
        
        function openEditModal(exp) { 
            currentEditingId = exp.id; 
            document.getElementById('modalTitle').innerText = '編輯紀錄'; 
            document.getElementById('editItem').value = exp.item; 
            document.getElementById('editAmount').value = exp.amount; 
            document.getElementById('editCategory').value = exp.category; 
            document.getElementById('isForeign').value = exp.isForeign ? "1" : "0"; 
            toggleModal(true); 
        }
        
        function closeModal() { toggleModal(false); }
        function toggleModal(show) { 
            const m = document.getElementById('editModal'); 
            if(show){m.classList.remove('pointer-events-none'); m.classList.add('opacity-100');}
            else{m.classList.add('pointer-events-none'); m.classList.remove('opacity-100');}
        }
        
        function saveEdit() {
            const item = document.getElementById('editItem').value.trim();
            const amount = parseFloat(document.getElementById('editAmount').value);
            const category = document.getElementById('editCategory').value;
            const isForeign = document.getElementById('isForeign').value === "1";
            if(!item || isNaN(amount)) return;
            
            if(currentEditingId){
                const idx = expenses.findIndex(e => String(e.id) === String(currentEditingId));
                if(idx !== -1) expenses[idx] = {...expenses[idx], item, amount, category, isForeign};
            }else{
                expenses.push({ id: Date.now().toString(), item, amount, category, isForeign, tripId: (isForeign && activeTrip) ? activeTrip.id : null, date: selectedDay.toISOString() });
            }
            updateUI(); closeModal();
        }

        function deleteRecordFromModal() {
            if(currentEditingId && confirm('確定刪除此紀錄？')) {
                const targetId = String(currentEditingId);
                expenses = expenses.filter(e => String(e.id) !== targetId);
                currentEditingId = null;
                updateUI(); 
                closeModal();
            }
        }

        function startVoiceRecognition() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) return alert('瀏覽器不支持語音辨識');
            const rec = new SpeechRecognition();
            rec.lang = 'zh-HK';
            rec.onstart = () => { 
                document.getElementById('voiceBtn').classList.add('recording', 'bg-red-500'); 
                document.getElementById('toast').classList.remove('hidden'); 
            };
            rec.onresult = (event) => {
                const transcript = event.results[0][0].transcript;
                document.getElementById('liveResult').innerText = transcript;
                if (event.results[0].isFinal) {
                    const amountMatch = transcript.match(/\d+/);
                    if (amountMatch) {
                        const amount = parseFloat(amountMatch[0]);
                        let item = transcript.replace(amountMatch[0], '').replace(/元|塊|錢|蚊/g, '').trim() || "語音輸入";
                        let category = '其他';
                        for (const [cat, keywords] of Object.entries(categories)) { if (keywords.some(k => item.includes(k))) { category = cat; break; } }
                        expenses.push({ id: Date.now().toString(), item, amount, category, isForeign: !!activeTrip, tripId: activeTrip ? activeTrip.id : null, date: new Date().toISOString() });
                        updateUI();
                    }
                }
            };
            rec.onend = () => { 
                document.getElementById('voiceBtn').classList.remove('recording', 'bg-red-500'); 
                setTimeout(() => document.getElementById('toast').classList.add('hidden'), 1500); 
            };
            rec.start();
        }

        document.getElementById('voiceBtn').onclick = startVoiceRecognition;

        function renderCalendar() {
            const grid = document.getElementById('calendarGrid');
            if(!grid) return;
            grid.innerHTML = '';
            const now = new Date();
            document.getElementById('calendarMonthTitle').innerText = now.toLocaleDateString('zh-HK', { year: 'numeric', month: 'long' });
            const firstDay = new Date(now.getFullYear(), now.getMonth(), 1).getDay();
            const daysInMonth = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
            for (let i = 0; i < firstDay; i++) grid.innerHTML += '<div></div>';
            for (let d = 1; d <= daysInMonth; d++) {
                const dateObj = new Date(now.getFullYear(), now.getMonth(), d);
                const hasExp = expenses.some(e => new Date(e.date).toLocaleDateString() === dateObj.toLocaleDateString());
                const dayEl = document.createElement('div');
                dayEl.className = `py-2 relative cursor-pointer ${dateObj.toLocaleDateString() === selectedDay.toLocaleDateString() ? 'selected' : ''} ${hasExp ? 'has-expense' : ''}`;
                dayEl.innerText = d;
                dayEl.onclick = () => { selectedDay = dateObj; renderCalendar(); showDayExpenses(dateObj); };
                grid.appendChild(dayEl);
            }
            showDayExpenses(selectedDay);
        }

        function showDayExpenses(date) {
            const list = document.getElementById('dayExpenseList');
            if(!list) return;
            document.getElementById('selectedDayLabel').innerText = `${date.getMonth()+1}月${date.getDate()}日 支出清單`;
            const dayData = expenses.filter(e => new Date(e.date).toLocaleDateString() === date.toLocaleDateString());
            list.innerHTML = '';
            if(dayData.length === 0) list.innerHTML = '<div class="text-center py-8 text-gray-400 text-xs">當日無紀錄</div>';
            else dayData.forEach(exp => list.appendChild(createExpenseItem(exp)));
        }

        function renderChart() {
            const canvas = document.getElementById('categoryChart');
            if(!canvas) return;
            const dataMap = { '飲食': 0, '交通': 0, '娛樂': 0, '生活': 0, '其他': 0 };
            expenses.forEach(e => { 
                const trip = trips.find(t => t.id === e.tripId);
                const val = e.isForeign && trip ? e.amount * trip.rate : e.amount;
                dataMap[e.category] = (dataMap[e.category] || 0) + val;
            });
            const labels = Object.keys(dataMap).filter(k => dataMap[k] > 0);
            if (chart) chart.destroy();
            if (!labels.length) return document.getElementById('chartFallback').classList.remove('hidden');
            document.getElementById('chartFallback').classList.add('hidden');
            chart = new Chart(canvas.getContext('2d'), { 
                type: 'doughnut', 
                data: { labels, datasets: [{ data: labels.map(l => dataMap[l]), backgroundColor: ['#6366f1', '#f59e0b', '#10b981', '#ef4444', '#94a3b8'], borderWidth: 0 }] }, 
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { boxWidth: 8, font: { size: 10 } } } }, cutout: '75%' } 
            });
        }

        function openTripModal() { document.getElementById('tripModal').classList.remove('pointer-events-none'); document.getElementById('tripModal').classList.add('opacity-100'); }
        function closeTripModal() { document.getElementById('tripModal').classList.add('pointer-events-none'); document.getElementById('tripModal').classList.remove('opacity-100'); }
        
        function saveTrip() {
            const dest = document.getElementById('tripDest').value;
            const rate = parseFloat(document.getElementById('tripRate').value);
            const code = document.getElementById('tripCurrencyCode').value;
            const curr = document.getElementById('tripCurrencySymbol').value || '$';
            const start = document.getElementById('tripStart').value;
            const end = document.getElementById('tripEnd').value;
            if(!dest || !rate || !start || !end) return alert('請填寫完整行程資料');
            trips.forEach(t => t.active = false);
            activeTrip = { id: Date.now(), dest, rate, currency: curr, currencyCode: code, startDate: start, endDate: end, active: true, date: new Date().toISOString() };
            trips.push(activeTrip); 
            updateUI(); 
            closeTripModal();
        }
        
        function endTrip() { if(confirm('確定結束此行程？它將會移至過往紀錄中。')) { if(activeTrip) activeTrip.active = false; activeTrip = null; updateUI(); } }
        
        function toggleAccordion(id) {
            const el = document.getElementById(`trip-accordion-${id}`);
            const isActive = el.classList.contains('accordion-active');
            document.querySelectorAll('.accordion-item').forEach(item => item.classList.remove('accordion-active'));
            if (!isActive) el.classList.add('accordion-active');
        }

        function renderTripView() {
            const activeContainer = document.getElementById('activeTripContainer');
            const activeList = document.getElementById('tripExpenseList');
            const activeDetailSection = document.getElementById('activeTripDetail');
            const actionArea = document.getElementById('tripActionArea');
            const addTripBtn = document.getElementById('addTripBtn');
            const pastList = document.getElementById('pastTripsList');

            // 1. 處理當前行程
            if(!activeTrip) { 
                activeContainer.innerHTML = `<div class="bg-indigo-50 p-8 rounded-2xl text-center"><p class="text-sm text-indigo-400 mb-4">目前沒有進行中的行程</p><button onclick="openTripModal()" class="bg-indigo-600 text-white px-6 py-2 rounded-full font-bold shadow-md">建立新行程</button></div>`; 
                activeDetailSection.classList.add('hidden');
                actionArea.classList.add('hidden');
                addTripBtn.classList.remove('hidden');
            } else {
                addTripBtn.classList.add('hidden');
                actionArea.classList.remove('hidden');
                activeDetailSection.classList.remove('hidden');
                const tripExps = expenses.filter(e => e.tripId === activeTrip.id);
                const totalHKD = tripExps.reduce((sum, e) => sum + (e.amount * activeTrip.rate), 0);
                const dRange = `${activeTrip.startDate.replace(/-/g, '/')} - ${activeTrip.endDate.replace(/-/g, '/')}`;

                activeContainer.innerHTML = `
                    <div onclick="openManualInput()" class="trip-card text-white p-6 rounded-3xl shadow-xl relative overflow-hidden">
                        <div class="absolute -right-4 -top-4 w-24 h-24 bg-white/10 rounded-full"></div>
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <h2 class="text-2xl font-bold">${activeTrip.dest}</h2>
                                <p class="text-[10px] opacity-90 mt-1">${dRange}</p>
                                <p class="text-[9px] opacity-70 mt-0.5">1 ${activeTrip.currencyCode} = ${activeTrip.rate} HKD</p>
                            </div>
                            <button onclick="event.stopPropagation(); endTrip();" class="bg-white/20 h-7 px-3 rounded-full text-[10px] backdrop-blur-md hover:bg-white/40">結束行程</button>
                        </div>
                        <div class="flex justify-between items-end">
                            <div>
                                <p class="text-[10px] opacity-70 uppercase tracking-wider">累計支出</p>
                                <p class="text-2xl font-black">HKD $${Math.round(totalHKD).toLocaleString()}</p>
                            </div>
                            <div class="bg-white/20 p-2 rounded-xl backdrop-blur-md"><svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" /></svg></div>
                        </div>
                    </div>`;
                activeList.innerHTML = '';
                if(!tripExps.length) activeList.innerHTML = '<div class="text-center py-8 text-gray-400 text-xs">暫無行程紀錄</div>';
                else tripExps.sort((a,b)=>new Date(b.date)-new Date(a.date)).forEach(exp => activeList.appendChild(createExpenseItem(exp)));
            }

            // 2. 處理過往行程 (Accordion)
            const pastTrips = trips.filter(t => !t.active).sort((a,b) => new Date(b.date) - new Date(a.date));
            pastList.innerHTML = '';
            if(pastTrips.length === 0) {
                pastList.innerHTML = '<div class="text-center py-8 text-gray-300 text-[10px]">無過往紀錄</div>';
            } else {
                pastTrips.forEach(trip => {
                    const tripExps = expenses.filter(e => e.tripId === trip.id);
                    const totalHKD = tripExps.reduce((sum, e) => sum + (e.amount * trip.rate), 0);
                    
                    const accordion = document.createElement('div');
                    accordion.id = `trip-accordion-${trip.id}`;
                    accordion.className = "accordion-item bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden";
                    
                    let expHtml = tripExps.length > 0 ? '' : '<div class="text-center py-4 text-gray-400 text-xs">此行程無消費紀錄</div>';
                    tripExps.sort((a,b)=>new Date(b.date)-new Date(a.date)).forEach(exp => {
                        const itemDiv = createExpenseItem(exp);
                        expHtml += itemDiv.outerHTML;
                    });

                    accordion.innerHTML = `
                        <div onclick="toggleAccordion(${trip.id})" class="p-4 flex justify-between items-center cursor-pointer active:bg-gray-50">
                            <div>
                                <p class="font-bold text-gray-800 text-sm">${trip.dest}</p>
                                <p class="text-[10px] text-gray-400">${trip.startDate.replace(/-/g, '/')} - ${trip.endDate.replace(/-/g, '/')}</p>
                            </div>
                            <div class="flex items-center gap-3">
                                <div class="text-right">
                                    <p class="text-xs font-bold text-indigo-600">$${Math.round(totalHKD).toLocaleString()}</p>
                                    <p class="text-[9px] text-gray-400">${tripExps.length} 筆紀錄</p>
                                </div>
                                <svg xmlns="http://www.w3.org/2000/svg" class="chevron h-4 w-4 text-gray-300" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" /></svg>
                            </div>
                        </div>
                        <div class="accordion-content bg-slate-50/50">
                            <div class="p-4 space-y-2 border-t border-gray-50">
                                ${expHtml}
                                <button onclick="deleteTrip(${trip.id})" class="w-full py-2 mt-4 text-[10px] text-red-300 hover:text-red-500 transition">刪除此行程紀錄</button>
                            </div>
                        </div>
                    `;
                    pastList.appendChild(accordion);
                });
            }
        }

        function deleteTrip(tripId) {
            if(confirm('確定刪除此行程及其所有消費紀錄？此操作無法還原。')) {
                expenses = expenses.filter(e => e.tripId !== tripId);
                trips = trips.filter(t => t.id !== tripId);
                updateUI();
            }
        }

        function clearAll() { if(confirm('清除所有資料？')) { expenses = []; trips = []; activeTrip = null; updateUI(); } }
        
        function exportCSV() {
            let csv = "\uFEFF日期,項目,原幣金額,是否外幣,匯率,折合HKD,分類,行程\n";
            expenses.forEach(e => {
                const trip = trips.find(t => t.id === e.tripId);
                const rate = e.isForeign && trip ? trip.rate : 1;
                const tripName = trip ? trip.dest : "無";
                csv += `${new Date(e.date).toLocaleString()},${e.item},${e.amount},${e.isForeign?'是':'否'},${rate},${e.amount*rate},${e.category},${tripName}\n`;
            });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv;charset=utf-8;' }));
            link.download = `記帳備份_${new Date().toLocaleDateString()}.csv`; link.click();
        }
    </script>
</body>
</html>
